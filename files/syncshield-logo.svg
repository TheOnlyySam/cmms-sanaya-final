<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" width="560" height="200">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 Z" fill="#00C8D4"/>
    </marker>
  </defs>

  <!-- Shield icon centered at x=47, full height -->
  <!-- Shield path: width=78, height=92 -->
  <path d="M 12 5 L 82 5 Q 90 5 90 13 L 90 58 Q 90 78 47 95 Q 4 78 4 58 L 4 13 Q 4 5 12 5 Z" fill="#0A1628"/>
  <path d="M 12 5 L 82 5 Q 90 5 90 13 L 90 58 Q 90 78 47 95 Q 4 78 4 58 L 4 13 Q 4 5 12 5 Z" fill="none" stroke="#00C8D4" stroke-width="1.2" opacity="0.4"/>

  <!-- Internal circuit dot lines -->
  <line x1="26" y1="22" x2="68" y2="22" stroke="#00C8D4" stroke-width="0.5" opacity="0.15"/>
  <circle cx="23" cy="22" r="2" fill="#00C8D4" opacity="0.2"/>
  <circle cx="71" cy="22" r="2" fill="#00C8D4" opacity="0.2"/>
  <line x1="20" y1="32" x2="74" y2="32" stroke="#00C8D4" stroke-width="0.5" opacity="0.08"/>

  <!-- Sync icon centered at (47, 55), radius 18 -->
  <!-- Arc 1: 45° to 195° CCW (sweep=0), via TOP -->
  <!-- 45°: (47+12.73, 55-12.73) = (59.7, 42.3) -->
  <!-- 195°: (47-17.39, 55+4.66) = (29.6, 59.7) -->
  <path d="M 60 42 A 18 18 0 0 0 30 60" stroke="#00C8D4" stroke-width="3.2" fill="none" stroke-linecap="round" marker-end="url(#ah)"/>

  <!-- Arc 2: 225° to 15° CCW (sweep=0), via BOTTOM -->
  <!-- 225°: (47-12.73, 55+12.73) = (34.3, 67.7) -->
  <!-- 15°: (47+17.39, 55-4.66) = (64.4, 50.3) -->
  <path d="M 34 68 A 18 18 0 0 0 64 50" stroke="#00C8D4" stroke-width="3.2" fill="none" stroke-linecap="round" marker-end="url(#ah)"/>

  <!-- Center dot -->
  <circle cx="47" cy="55" r="2.8" fill="#00C8D4" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="108" y="54" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" letter-spacing="-0.5">SYNC</text>
  <text x="108" y="54" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" letter-spacing="-0.5" dx="76">SHIELD</text>
  <!-- Color the SHIELD part -->
  <text x="184" y="54" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="32" fill="#00C8D4" letter-spacing="-0.5">SHIELD</text>
  <!-- Tagline -->
  <text x="108" y="72" font-family="Arial, sans-serif" font-weight="300" font-size="9" fill="#6B8CAE" letter-spacing="2.5">SYNC EVERY ASSET · SHIELD EVERY OPERATION</text>
  <!-- Category badge -->
  <rect x="108" y="80" width="90" height="13" rx="2" fill="#1E3A5C"/>
  <text x="153" y="90" font-family="Arial, sans-serif" font-size="7.5" fill="#00C8D4" text-anchor="middle" letter-spacing="1.5">CMMS PLATFORM</text>
</svg>
